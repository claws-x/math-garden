---
layout: default
---

<article class="post">
  <div class="post-header">
    <div class="post-category-label">
      {{ page.categories | join: ' · ' | default: '数学笔记' }}
    </div>
    <h1 class="post-title-main">{{ page.title }}</h1>
    <div class="post-meta">{{ page.date | date: "%Y年%m月%d日" }} · Graham</div>
  </div>
  <div class="post-content">
    {{ content }}
  </div>
</article>
